<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFV-ify | The Guerrilla Slide Generator v1.1</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #E2E8F0; }
        h1, h2, h3, .font-bitter { font-family: 'Bitter', serif; }
        
        .tfv-blue { background-color: #2A419A; }
        .tfv-dark-blue { background-color: #141E64; }
        .tfv-tangerine { background-color: #F58220; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .CodeMirror {
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding-top: 10px;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Navbar -->
    <header class="tfv-dark-blue text-white p-4 flex justify-between items-center shadow-lg z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 tfv-tangerine rounded flex items-center justify-center font-bitter font-bold text-xl">T</div>
            <div>
                <h1 class="text-xl font-bitter font-semibold tracking-wide">TFV-ify <span class="text-xs text-gray-300 font-inter font-normal ml-2">Guerrilla Scraper v1.1</span></h1>
            </div>
        </div>
        <div class="flex gap-4">
            <button id="btn-update" class="px-4 py-2 border border-gray-400 rounded hover:bg-white hover:text-blue-900 transition text-sm font-medium">
                Update Preview
            </button>
            <button id="btn-export" class="tfv-tangerine hover:bg-orange-600 text-white px-6 py-2 rounded shadow transition font-semibold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                    <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                </svg>
                Export to PPTX
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Left Column: The Code Editor -->
        <section class="w-1/2 flex flex-col border-r border-gray-300 bg-[#212121]">
            <div class="bg-gray-100 p-2 border-b border-gray-300 flex justify-between items-center text-sm text-gray-600 font-medium">
                <span class="flex items-center gap-2">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                    HTML Source Code (Accepts .slide or .slide-container)
                </span>
            </div>
            
            <div class="flex-1 relative">
                <textarea id="html-input" class="hidden">
<!-- Paste your legacy code here. The parser is now forgiving. -->
                </textarea>
            </div>
        </section>

        <!-- Right Column: The Visual Preview -->
        <section class="w-1/2 bg-slate-200 flex flex-col relative overflow-y-auto p-8 items-center gap-8" id="preview-pane">
            <!-- Slides will be injected here for preview -->
        </section>

    </main>

    <div id="virtual-dom" style="display: none;"></div>

    <script>
        // --- CORE UI LOGIC ---
        const htmlInput = document.getElementById('html-input');
        const previewPane = document.getElementById('preview-pane');
        const virtualDom = document.getElementById('virtual-dom');
        const btnUpdate = document.getElementById('btn-update');
        const btnExport = document.getElementById('btn-export');

        const editor = CodeMirror.fromTextArea(htmlInput, {
            mode: "xml",
            theme: "material-darker",
            lineNumbers: true,
            lineWrapping: true,
            autoCloseTags: true
        });

        // Forgiving Preview Renderer
        function updatePreview() {
            const rawHTML = editor.getValue();
            virtualDom.innerHTML = rawHTML;
            previewPane.innerHTML = ''; 
            
            // Query for both your new semantic classes AND your old legacy classes
            const slides = virtualDom.querySelectorAll('.slide, .slide-container');
            
            if(slides.length === 0) {
                previewPane.innerHTML = '<div class="text-gray-500 mt-20 text-center">No slides found. Ensure you have &lt;div class="slide"&gt; or &lt;div class="slide-container"&gt;.</div>';
                return;
            }

            slides.forEach((slide, index) => {
                const card = document.createElement('div');
                card.className = 'w-full max-w-4xl bg-white shadow-lg border border-gray-200 relative overflow-hidden shrink-0';
                card.style.aspectRatio = '16/9';
                
                const label = document.createElement('div');
                label.className = 'absolute top-0 left-0 bg-gray-800 text-white text-xs px-2 py-1 rounded-br z-10';
                label.innerText = `Slide ${index + 1}`;
                card.appendChild(label);

                const contentWrapper = document.createElement('div');
                contentWrapper.className = 'w-full h-full p-8 overflow-hidden';
                contentWrapper.innerHTML = slide.innerHTML;
                
                // Extremely generic fallback CSS for the preview so old classes don't look completely broken
                const style = document.createElement('style');
                style.innerHTML = `
                    h1 { font-family: 'Bitter', serif; font-size: 2.2rem; color: #141E64; font-weight: 600; margin-bottom: 1rem; text-align: center; }
                    h2 { font-family: 'Bitter', serif; font-size: 1.8rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; color: #2A419A; border-bottom: 2px solid #FFC543; padding-bottom: 5px; }
                    h3 { font-family: 'Inter', sans-serif; font-size: 1.25rem; font-weight: 600; color: #2A419A; margin-top: 1rem; margin-bottom: 0.5rem; }
                    p, li { font-family: 'Inter', sans-serif; font-size: 1rem; color: #1E293B; margin-bottom: 0.75rem; line-height: 1.6; }
                    ul { list-style-type: disc; padding-left: 20px; }
                    .sidebar { width: 35%; float: left; padding-right: 20px;}
                    .main-stage { width: 65%; float: left; background: #f8fafc; padding: 20px; border-radius: 8px; height: 100%;}
                    .title-layout { display: flex; flex-direction: column; justify-content: center; height: 100%; text-align: center; }
                `;
                contentWrapper.appendChild(style);

                card.appendChild(contentWrapper);
                previewPane.appendChild(card);
            });
        }

        setTimeout(updatePreview, 100);
        btnUpdate.addEventListener('click', updatePreview);
        
        let timeout = null;
        editor.on('change', () => {
            clearTimeout(timeout);
            timeout = setTimeout(updatePreview, 1000);
        });


        // --- THE ALCHEMY v1.1: ROBUST SCRAPER ---
        btnExport.addEventListener('click', () => {
            
            let pres = new PptxGenJS();
            pres.layout = 'LAYOUT_16x9'; 
            pres.author = 'TFV-ify Guerrilla Generator';

            const COLORS = {
                darkBlue: '141E64',
                blue: '2A419A',
                tangerine: 'F58220',
                yellow: 'FFC543',
                textMain: '1E293B',
                textMuted: '475569'
            };
            
            const FONTS = { serif: 'Georgia', sans: 'Arial' };

            const rawHTML = editor.getValue();
            virtualDom.innerHTML = rawHTML;
            
            // ACCEPT BOTH FORMATS
            const slides = virtualDom.querySelectorAll('.slide, .slide-container');

            if(slides.length === 0) {
                alert("No slides found! Please ensure your HTML has <div class='slide'> or <div class='slide-container'> elements.");
                return;
            }

            slides.forEach((htmlSlide, index) => {
                let slide = pres.addSlide();
                slide.background = { color: 'FFFFFF' };

                // Add standard TFV Header
                slide.addText("Teach For Viet\nNam", { x: 0.5, y: 0.3, w: 2, h: 0.5, fontSize: 10, fontFace: FONTS.sans, bold: true, color: COLORS.textMain });
                slide.addText("Brand\nGuideline", { x: 3.0, y: 0.3, w: 2, h: 0.5, fontSize: 10, fontFace: FONTS.sans, bold: true, color: COLORS.textMain });
                slide.addText(`${index + 1}`, { x: 9.0, y: 0.3, w: 0.5, h: 0.5, fontSize: 10, fontFace: FONTS.sans, bold: true, color: COLORS.textMain, align: 'right' });

                // Is this a centered title slide from your old layout?
                const isTitleLayout = htmlSlide.querySelector('.title-layout') !== null || htmlSlide.querySelector('.elicitation-layout') !== null;
                const isTFVTemplate = htmlSlide.querySelector('.sidebar') !== null;

                let currentY = 1.2;
                let currentX = 0.5;
                let maxWidth = 9.0;

                if (isTFVTemplate) {
                    // It uses the TFV semantic classes we built yesterday. Use rigid columns.
                    const sidebar = htmlSlide.querySelector('.sidebar');
                    if (sidebar) {
                        let leftY = currentY;
                        sidebar.querySelectorAll('h1, h2, h3, p').forEach(el => {
                            let text = el.innerText.trim();
                            if(!text) return;
                            let tag = el.tagName.toLowerCase();
                            
                            if (tag === 'h1' || tag === 'h2') {
                                slide.addText(text, { x: 0.5, y: leftY, w: 3.5, h: 0.5, fontSize: 28, fontFace: FONTS.serif, bold: true, color: COLORS.darkBlue });
                                leftY += 0.7;
                            } else if (tag === 'h3') {
                                slide.addText(text, { x: 0.5, y: leftY, w: 3.5, h: 0.4, fontSize: 14, fontFace: FONTS.sans, bold: true, color: COLORS.blue });
                                leftY += 0.4;
                            } else if (tag === 'p') {
                                let hEst = Math.max(0.4, (text.length / 40) * 0.25); 
                                slide.addText(text, { x: 0.5, y: leftY, w: 3.5, h: hEst, fontSize: 12, fontFace: FONTS.sans, color: COLORS.textMain });
                                leftY += hEst + 0.1;
                            }
                        });
                    }

                    const mainStage = htmlSlide.querySelector('.main-stage');
                    if (mainStage) {
                        slide.addShape(pres.ShapeType.rect, { x: 4.5, y: 0.8, w: 5.0, h: 4.5, fill: { color: 'E2E8F0' }, line: { type: 'none' } });
                        let rightY = 1.0;
                        mainStage.querySelectorAll('h2, h3, p').forEach(el => {
                            let text = el.innerText.trim();
                            if(!text) return;
                            let tag = el.tagName.toLowerCase();

                            if (tag === 'h2' || tag === 'h3') {
                                slide.addText(text, { x: 4.8, y: rightY, w: 4.4, h: 0.4, fontSize: 18, fontFace: FONTS.serif, bold: true, color: COLORS.blue });
                                rightY += 0.5;
                            } else if (tag === 'p') {
                                let hEst = Math.max(0.4, (text.length / 50) * 0.25);
                                slide.addText(text, { x: 4.8, y: rightY, w: 4.4, h: hEst, fontSize: 14, fontFace: FONTS.sans, color: COLORS.textMuted });
                                rightY += hEst + 0.1;
                            }
                        });
                    }
                } else {
                    // GUERRILLA SCRAPER: For your old "Culture and the Arts" layout
                    // It blindly sweeps through the slide, grabbing text and throwing it on the canvas in order.
                    const elements = htmlSlide.querySelectorAll('h1, h2, h3, p, li');
                    
                    elements.forEach(el => {
                        let text = el.innerText.trim();
                        if(!text) return;
                        
                        let tag = el.tagName.toLowerCase();
                        let alignOpt = isTitleLayout ? 'center' : 'left';

                        if (tag === 'h1') {
                            slide.addText(text, { x: currentX, y: currentY, w: maxWidth, h: 0.8, fontSize: 44, fontFace: FONTS.serif, bold: true, color: COLORS.darkBlue, align: alignOpt });
                            currentY += 1.0;
                        } else if (tag === 'h2') {
                            // Give it a nice yellow underline effect simulating your old layout
                            slide.addShape(pres.ShapeType.rect, { x: currentX, y: currentY + 0.5, w: maxWidth, h: 0.05, fill: { color: COLORS.yellow }, line: { type: 'none' } });
                            slide.addText(text, { x: currentX, y: currentY, w: maxWidth, h: 0.6, fontSize: 28, fontFace: FONTS.serif, bold: true, color: COLORS.darkBlue, align: alignOpt });
                            currentY += 0.8;
                        } else if (tag === 'h3') {
                            slide.addText(text, { x: currentX, y: currentY, w: maxWidth, h: 0.5, fontSize: 20, fontFace: FONTS.sans, bold: true, color: COLORS.blue, align: alignOpt });
                            currentY += 0.6;
                        } else if (tag === 'p') {
                            let hEst = Math.max(0.4, (text.length / 80) * 0.25);
                            slide.addText(text, { x: currentX, y: currentY, w: maxWidth, h: hEst, fontSize: 16, fontFace: FONTS.sans, color: COLORS.textMain, align: alignOpt });
                            currentY += hEst + 0.1;
                        } else if (tag === 'li') {
                            let hEst = Math.max(0.3, (text.length / 80) * 0.25);
                            slide.addText(text, { x: currentX + 0.5, y: currentY, w: maxWidth - 0.5, h: hEst, fontSize: 16, fontFace: FONTS.sans, color: COLORS.textMain, bullet: true });
                            currentY += hEst + 0.1;
                        }

                        // Prevent items from falling off the bottom of the slide
                        if (currentY > 5.0) {
                            currentY = 1.2; 
                            currentX += 4.5; // Start a new column
                            maxWidth = 4.5;
                        }
                    });
                }
            });

            pres.writeFile({ fileName: `TFV_Export_Guerrilla_${new Date().getTime()}.pptx` })
                .then(fileName => {
                    console.log(`Successfully exported: ${fileName}`);
                })
                .catch(err => {
                    console.error(err);
                    alert("Error exporting PPTX. The corporate defenses held.");
                });
        });
    </script>
</body>
</html>
