<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFV-ify | The Dictator Engine v4.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #E2E8F0; }
        .tfv-blue { background-color: #2A419A; }
        .tfv-dark-blue { background-color: #141E64; }
        .tfv-tangerine { background-color: #F58220; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .CodeMirror { height: 100%; font-family: 'Courier New', Courier, monospace; font-size: 14px; padding-top: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="tfv-dark-blue text-white p-4 flex justify-between items-center shadow-lg z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 tfv-tangerine rounded flex items-center justify-center font-serif font-bold text-xl">T</div>
            <div>
                <h1 class="text-xl font-serif font-semibold tracking-wide">TFV-ify <span class="text-xs text-gray-300 font-sans font-normal ml-2">The Dictator v4.0</span></h1>
            </div>
        </div>
        <div class="flex gap-4">
            <button id="btn-update" class="px-4 py-2 border border-gray-400 rounded hover:bg-white hover:text-blue-900 transition text-sm font-medium">Update Preview</button>
            <button id="btn-export" class="tfv-tangerine hover:bg-orange-600 text-white px-6 py-2 rounded shadow transition font-semibold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
                Export to PPTX
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="w-1/2 flex flex-col border-r border-gray-300 bg-[#212121]">
            <div class="bg-gray-100 p-2 border-b border-gray-300 flex justify-between items-center text-sm text-gray-600 font-medium">
                <span class="flex items-center gap-2">HTML Source Code</span>
            </div>
            <div class="flex-1 relative">
                <textarea id="html-input" class="hidden"></textarea>
            </div>
        </section>

        <section class="w-1/2 bg-slate-200 relative p-0 m-0" id="preview-pane">
            <iframe id="preview-frame" class="w-full h-full border-0 bg-white shadow-inner"></iframe>
        </section>
    </main>

    <script>
        const htmlInput = document.getElementById('html-input');
        const btnUpdate = document.getElementById('btn-update');
        const btnExport = document.getElementById('btn-export');
        const previewFrame = document.getElementById('preview-frame');

        const editor = CodeMirror.fromTextArea(htmlInput, {
            mode: "xml", theme: "material-darker", lineNumbers: true, lineWrapping: true, autoCloseTags: true
        });

        editor.on('paste', (cm, event) => {
            const pastedText = (event.clipboardData || window.clipboardData).getData('text');
            if (pastedText && pastedText.length > 500) {
                setTimeout(() => { cm.scrollTo(0, 0); cm.setCursor(0, 0); }, 10);
            }
        });

        function updatePreview() {
            const doc = previewFrame.contentWindow.document;
            doc.open();
            doc.write(editor.getValue());
            doc.write(`
                <style>
                    body { zoom: calc(100vw / 1350) !important; margin: 0; }
                    @-moz-document url-prefix() {
                        body { transform: scale(calc(100vw / 1350)); transform-origin: top center; overflow-x: hidden; }
                    }
                </style>
            `);
            doc.close();
        }

        setTimeout(updatePreview, 100);
        btnUpdate.addEventListener('click', updatePreview);
        editor.on('change', () => { setTimeout(updatePreview, 1000); });

        // --- THE DICTATOR: EXPLICIT PPTX COORDINATES ---
        btnExport.addEventListener('click', () => {
            let pres = new PptxGenJS();
            pres.defineLayout({ name: 'TFV_WIDE', width: 13.33, height: 7.5 });
            pres.layout = 'TFV_WIDE'; 
            pres.author = 'TFV-ify Dictator Engine';

            const COLORS = {
                darkBlue: '141E64', blue: '2A419A', tangerine: 'F58220', yellow: 'FFC543',
                bgLight: 'F8FAFC', textMain: '1E293B', textMuted: '475569', white: 'FFFFFF', gray: 'CBD5E1'
            };
            const FONTS = { serif: 'Georgia', sans: 'Arial' };

            const parser = new DOMParser();
            const virtualDom = parser.parseFromString(editor.getValue(), 'text/html');
            const slides = virtualDom.querySelectorAll('.slide-container');

            if(slides.length === 0) return alert("No <div class='slide-container'> found!");

            slides.forEach((htmlSlide, index) => {
                let slide = pres.addSlide();
                
                // --- SLIDE 1: TITLE ---
                if (htmlSlide.querySelector('.title-layout')) {
                    slide.background = { color: COLORS.darkBlue };
                    let title = htmlSlide.querySelector('h1')?.innerText || '';
                    let sub = htmlSlide.querySelector('.subtitle')?.innerText || '';
                    slide.addText(title, { x: 1, y: 2.8, w: 11.33, h: 1.5, fontSize: 60, fontFace: FONTS.serif, bold: true, color: COLORS.white, align: 'center' });
                    slide.addText(sub, { x: 1, y: 4.2, w: 11.33, h: 1, fontSize: 22, fontFace: FONTS.sans, color: COLORS.yellow, align: 'center' });
                    return;
                }
                
                // --- SLIDE 11: BREAK ---
                if (htmlSlide.querySelector('.section-title-layout')) {
                    slide.background = { color: COLORS.blue };
                    let title = htmlSlide.querySelector('h2')?.innerText || '';
                    let sub = htmlSlide.querySelector('p')?.innerText || '';
                    slide.addText(title, { x: 1, y: 3.0, w: 11.33, h: 1.5, fontSize: 60, fontFace: FONTS.serif, bold: true, color: COLORS.white, align: 'center' });
                    slide.addText(sub, { x: 1, y: 4.5, w: 11.33, h: 1, fontSize: 22, fontFace: FONTS.sans, color: COLORS.yellow, align: 'center' });
                    return;
                }

                slide.background = { color: COLORS.white };
                
                // --- COMMON HEADER ---
                let titleEl = htmlSlide.querySelector('.slide-title');
                if (titleEl) {
                    // Remove nested spans/icons text if any
                    let titleText = Array.from(titleEl.childNodes).filter(n => n.nodeType === 3).map(n => n.textContent).join('').trim();
                    if (!titleText) titleText = titleEl.innerText;
                    
                    if(htmlSlide.id !== 'slide15') { // Slide 15 title is centered differently
                        slide.addText(titleText, { x: 0.6, y: 0.4, w: 12, h: 1, fontSize: 36, fontFace: FONTS.serif, bold: true, color: COLORS.darkBlue });
                        slide.addShape(pres.ShapeType.rect, { x: 0.6, y: 1.3, w: 12, h: 0.04, fill: { color: COLORS.yellow } });
                    }
                }

                // --- SLIDE 2: ICEBREAKER ---
                if (htmlSlide.id === 'slide2' || htmlSlide.querySelector('.six-grid')) {
                    let prompt = htmlSlide.querySelector('h3')?.innerText || "";
                    slide.addText(prompt, { x: 1, y: 1.6, w: 11.33, h: 0.8, fontSize: 24, fontFace: FONTS.sans, bold: true, color: COLORS.textMain, align: 'center' });
                    
                    let gridItems = htmlSlide.querySelectorAll('.image-tile p');
                    let startX = 1.5, startY = 2.5, spX = 3.6, spY = 2.4;
                    gridItems.forEach((p, i) => {
                        let c = i % 3, r = Math.floor(i / 3);
                        let x = startX + (c * spX), y = startY + (r * spY);
                        // Draw gray placeholder instead of image to prevent cross-origin taint issues
                        slide.addShape(pres.ShapeType.rect, { x: x, y: y, w: 3, h: 1.8, fill: { color: 'E2E8F0' } });
                        slide.addText(p.innerText, { x: x, y: y + 1.85, w: 3, h: 0.4, fontSize: 16, fontFace: FONTS.sans, bold: true, color: COLORS.textMain, align: 'center' });
                    });
                    return;
                }

                // --- SLIDE 3, 5, 14: TWO COLUMN TILED ---
                if (htmlSlide.querySelector('.two-column.tiled')) {
                    let cols = htmlSlide.querySelectorAll('.two-column.tiled > div');
                    let xPositions = [0.8, 7.0];
                    cols.forEach((col, i) => {
                        let x = xPositions[i];
                        slide.addShape(pres.ShapeType.roundRect, { x: x, y: 1.8, w: 5.5, h: 4.8, fill: { color: COLORS.bgLight }, line: { color: i===0?COLORS.blue:COLORS.yellow, width: 4 } });
                        
                        let y = 2.1;
                        // Grab elements specifically to avoid mushing
                        let headers = col.querySelectorAll('h3');
                        let paras = col.querySelectorAll('p');
                        let uls = col.querySelectorAll('ul');
                        
                        if (headers.length > 0) {
                            headers.forEach((h, idx) => {
                                slide.addText(h.innerText, { x: x+0.4, y: y, w: 4.7, h: 0.5, fontSize: 24, fontFace: FONTS.serif, bold: true, color: COLORS.blue });
                                y += 0.6;
                                if (paras[idx]) {
                                    let pText = paras[idx].innerText.replace(/\n/g, ' ');
                                    slide.addText(pText, { x: x+0.4, y: y, w: 4.7, h: 0.8, fontSize: 18, fontFace: FONTS.sans, color: COLORS.textMain });
                                    y += 0.9;
                                }
                            });
                        }
                        
                        if (uls.length > 0) {
                            let listItems = Array.from(uls[0].querySelectorAll('li')).map(li => ({
                                text: li.innerText.replace(/[\n\r]+/g, ' ').trim() + '\n',
                                options: { bullet: true, fontSize: 18, fontFace: FONTS.sans, color: COLORS.textMain }
                            }));
                            slide.addText(listItems, { x: x+0.4, y: y, w: 4.7, h: 2.5, valign: 'top' });
                        }
                    });
                    return;
                }

                // --- SLIDE 4: ELICITATION ---
                if (htmlSlide.id === 'slide4' || (htmlSlide.querySelector('.elicitation-layout') && htmlSlide.id !== 'slide15')) {
                    let h1 = htmlSlide.querySelector('h1')?.innerText || '';
                    let sub = htmlSlide.querySelector('.subtitle-box')?.innerText || '';
                    slide.addText(h1, { x: 1, y: 2.5, w: 11.33, h: 1, fontSize: 55, fontFace: FONTS.sans, color: COLORS.textMain, align: 'center' });
                    slide.addShape(pres.ShapeType.rect, { x: 2, y: 3.8, w: 9.33, h: 1.5, fill: { type: 'none' }, line: { color: COLORS.gray, width: 2, dashType: 'dash' } });
                    slide.addText(sub, { x: 2, y: 4.3, w: 9.33, h: 1, fontSize: 24, fontFace: FONTS.sans, color: COLORS.textMuted, align: 'center' });
                    return;
                }

                // --- SLIDE 6: GIST READING (MCQ) ---
                if (htmlSlide.querySelector('.mcq-options')) {
                    let h3 = htmlSlide.querySelector('h3')?.innerText || '';
                    let p = htmlSlide.querySelector('p')?.innerText || '';
                    slide.addText(h3, { x: 1, y: 1.8, w: 11.33, h: 0.8, fontSize: 28, fontFace: FONTS.sans, bold: true, color: COLORS.textMain, align: 'center' });
                    slide.addText(p, { x: 1, y: 2.4, w: 11.33, h: 0.5, fontSize: 18, fontFace: FONTS.sans, color: COLORS.tangerine, bold: true, align: 'center' });
                    
                    let opts = htmlSlide.querySelectorAll('.mcq-option');
                    let yPos = [3.2, 4.3, 5.4];
                    opts.forEach((opt, i) => {
                        let y = yPos[i];
                        let letter = opt.querySelector('.letter')?.innerText || '';
                        let text = opt.lastElementChild?.innerText || '';
                        
                        slide.addShape(pres.ShapeType.roundRect, { x: 2.0, y: y, w: 9.33, h: 0.9, fill: { color: COLORS.bgLight }, line: { color: 'E2E8F0', width: 2 } });
                        slide.addShape(pres.ShapeType.oval, { x: 2.3, y: y + 0.15, w: 0.6, h: 0.6, fill: { color: COLORS.white } });
                        slide.addText(letter, { x: 2.3, y: y + 0.15, w: 0.6, h: 0.6, fontSize: 20, fontFace: FONTS.serif, bold: true, color: COLORS.tangerine, align: 'center' });
                        slide.addText(text, { x: 3.2, y: y + 0.25, w: 8.0, h: 0.5, fontSize: 20, fontFace: FONTS.sans, color: COLORS.textMain });
                    });
                    return;
                }

                // --- SLIDE 7: TFNG INSTRUCTIONS ---
                if (htmlSlide.id === 'slide7' || htmlSlide.querySelector('.highlight-numbers-layout')) {
                    slide.addText("⚖️", { x: 1.5, y: 2.5, w: 3, h: 3, fontSize: 100, fontFace: FONTS.sans, align: 'center' });
                    slide.addText("TRUE", { x: 5, y: 2.0, w: 7, h: 0.5, fontSize: 22, fontFace: FONTS.sans, bold: true, color: '10B981' });
                    slide.addText("The text gives the same idea as the statement.", { x: 5, y: 2.4, w: 7, h: 0.5, fontSize: 18, fontFace: FONTS.sans, color: COLORS.textMain });
                    slide.addText("FALSE", { x: 5, y: 3.5, w: 7, h: 0.5, fontSize: 22, fontFace: FONTS.sans, bold: true, color: 'EF4444' });
                    slide.addText("The text gives the opposite idea to the statement.", { x: 5, y: 3.9, w: 7, h: 0.5, fontSize: 18, fontFace: FONTS.sans, color: COLORS.textMain });
                    slide.addText("NOT GIVEN", { x: 5, y: 5.0, w: 7, h: 0.5, fontSize: 22, fontFace: FONTS.sans, bold: true, color: '64748B' });
                    slide.addText("The information in the statement is not stated in the text.", { x: 5, y: 5.4, w: 7, h: 0.5, fontSize: 18, fontFace: FONTS.sans, color: COLORS.textMain });
                    return;
                }

                // --- SLIDE 13: MODEL TEXT ---
                if (htmlSlide.id === 'slide13' || htmlSlide.querySelector('.model-text-layout')) {
                    slide.addText("Model text", { x: 0.5, y: 1.8, w: 3.5, h: 0.8, fontSize: 40, fontFace: FONTS.serif, bold: true, color: COLORS.darkBlue });
                    slide.addText("Read the output model.\n\nIndividual • 3 min • Notice", { x: 0.5, y: 2.8, w: 3.5, h: 1, fontSize: 16, fontFace: FONTS.sans, color: COLORS.textMuted });
                    slide.addShape(pres.ShapeType.roundRect, { x: 4.0, y: 1.0, w: 8.5, h: 6.0, fill: { color: 'EEF2F6' } });
                    
                    let pText = htmlSlide.querySelector('.model-text-content div p')?.innerText || "";
                    slide.addText(pText, { x: 4.5, y: 1.3, w: 7.5, h: 3.5, fontSize: 18, fontFace: FONTS.sans, color: COLORS.textMain, lineSpacing: 24 });
                    
                    let qText = Array.from(htmlSlide.querySelectorAll('.model-text-questions p')).map(p=>p.innerText).join('\n');
                    slide.addText(qText, { x: 4.5, y: 5.0, w: 7.5, h: 1.5, fontSize: 16, fontFace: FONTS.sans, color: COLORS.darkBlue, bold: true });
                    return;
                }

                // --- SLIDE 15: HOMEWORK ---
                if (htmlSlide.id === 'slide15') {
                    let title = htmlSlide.querySelector('h2')?.innerText || '';
                    let sub = htmlSlide.querySelector('.elicitation-layout > p')?.innerText || '';
                    slide.addText(title, { x: 1, y: 1.0, w: 11.33, h: 0.8, fontSize: 40, fontFace: FONTS.serif, bold: true, color: COLORS.darkBlue, align: 'center' });
                    slide.addText(sub, { x: 1, y: 1.8, w: 11.33, h: 0.6, fontSize: 22, fontFace: FONTS.sans, bold: true, color: COLORS.blue, align: 'center' });
                    
                    slide.addShape(pres.ShapeType.roundRect, { x: 2, y: 3.0, w: 9.33, h: 3.5, fill: { color: COLORS.bgLight } });
                    slide.addShape(pres.ShapeType.rect, { x: 2, y: 3.0, w: 0.1, h: 3.5, fill: { color: COLORS.tangerine } });
                    
                    slide.addText("Homework Task:", { x: 2.5, y: 3.4, w: 8, h: 0.5, fontSize: 20, fontFace: FONTS.sans, bold: true, color: COLORS.textMain });
                    
                    let hwDesc = htmlSlide.querySelectorAll('.elicitation-layout div p');
                    if (hwDesc.length >= 2) {
                        slide.addText(hwDesc[0].innerText, { x: 2.5, y: 4.0, w: 8, h: 1.5, fontSize: 18, fontFace: FONTS.sans, color: COLORS.textMain });
                        slide.addText(hwDesc[1].innerText, { x: 2.5, y: 5.5, w: 8, h: 0.5, fontSize: 16, fontFace: FONTS.sans, color: COLORS.textMuted });
                    }
                    return;
                }

                // --- FALLBACK (Slide 8, 9, 10, 12) ---
                let curY = 2.5;
                let isCentered = htmlSlide.id === 'slide8' || htmlSlide.id === 'slide9' || htmlSlide.id === 'slide12';
                let alignOpt = isCentered ? 'center' : 'left';
                let xPos = isCentered ? 1.0 : 1.5;
                let wSize = isCentered ? 11.33 : 10.33;

                let headers = htmlSlide.querySelectorAll('h3');
                if (headers.length > 0) {
                    slide.addText(headers[0].innerText, { x: xPos, y: curY, w: wSize, h: 0.8, fontSize: 32, fontFace: FONTS.sans, bold: true, color: COLORS.textMain, align: alignOpt });
                    curY += 1.0;
                }

                let paras = htmlSlide.querySelectorAll('.content-area > div > p');
                paras.forEach(p => {
                    let isOrange = p.style?.color?.includes('tangerine') || false;
                    let pText = p.innerText.replace(/\n/g, ' ');
                    slide.addText(pText, { x: xPos, y: curY, w: wSize, h: 1.0, fontSize: 22, fontFace: FONTS.sans, color: isOrange ? COLORS.tangerine : COLORS.textMain, bold: isOrange, align: alignOpt });
                    curY += 1.2;
                });

                let uls = htmlSlide.querySelectorAll('.content-area ul');
                if (uls.length > 0) {
                    let listItems = Array.from(uls[0].querySelectorAll('li')).map(li => ({
                        text: li.innerText.replace(/[\n\r]+/g, ' ').trim() + '\n',
                        options: { bullet: true, fontSize: 18, fontFace: FONTS.sans, color: COLORS.textMain }
                    }));
                    slide.addText(listItems, { x: xPos + 0.5, y: curY - 0.5, w: wSize - 0.5, h: 3.0, valign: 'top' });
                }
            });

            pres.writeFile({ fileName: `TFV_Export_Flawless_${new Date().getTime()}.pptx` })
                .then(fileName => { console.log(`Successfully exported: ${fileName}`); })
                .catch(err => { alert("Error exporting PPTX."); });
        });
    </script>
</body>
</html>
