<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFV-ify | The Universal Engine v5.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-darker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #E2E8F0; }
        .tfv-dark-blue { background-color: #141E64; }
        .tfv-tangerine { background-color: #F58220; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .CodeMirror { height: 100%; font-family: 'Courier New', Courier, monospace; font-size: 14px; padding-top: 10px; }

        /* The Preview Container Mechanics */
        #preview-wrapper {
            width: 100%;
            height: 100%;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            background-color: #cbd5e1;
            position: relative;
        }

        /* This container scales visually via JS zoom controls */
        #iframe-scaler {
            transform-origin: top center;
            transition: transform 0.2s ease-out;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            background: white;
            /* 1280x720 is exactly 13.33 x 7.5 inches at 96 DPI */
            width: 1280px; 
            min-height: 720px; 
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="tfv-dark-blue text-white p-4 flex justify-between items-center shadow-lg z-20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 tfv-tangerine rounded flex items-center justify-center font-serif font-bold text-xl">T</div>
            <div>
                <h1 class="text-xl font-serif font-semibold tracking-wide">TFV-ify <span class="text-xs text-gray-300 font-sans font-normal ml-2">Universal Geometric Engine v5.0</span></h1>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <span id="export-status" class="text-sm text-yellow-300 font-medium hidden">Forging PPTX...</span>
            <button id="btn-update" class="px-4 py-2 border border-gray-400 rounded hover:bg-white hover:text-blue-900 transition text-sm font-medium">Update Preview</button>
            <button id="btn-export" class="tfv-tangerine hover:bg-orange-600 text-white px-6 py-2 rounded shadow transition font-semibold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
                Export to PPTX
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <!-- Editor -->
        <section class="w-1/2 flex flex-col border-r border-gray-400 bg-[#212121] z-10 shadow-xl">
            <div class="bg-gray-100 p-2 border-b border-gray-300 flex justify-between items-center text-sm text-gray-600 font-medium">
                <span class="flex items-center gap-2">HTML Source Code</span>
            </div>
            <div class="flex-1 relative">
                <textarea id="html-input" class="hidden"></textarea>
            </div>
        </section>

        <!-- Preview Pane -->
        <section class="w-1/2 flex flex-col relative bg-slate-300">
            
            <!-- The Zoom Toolbar -->
            <div class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full shadow-lg flex gap-4 items-center z-20 opacity-90 hover:opacity-100 transition">
                <button id="btn-zoom-out" class="hover:text-orange-400 font-bold px-2">-</button>
                <span id="zoom-label" class="text-sm font-mono w-12 text-center">50%</span>
                <button id="btn-zoom-in" class="hover:text-orange-400 font-bold px-2">+</button>
                <div class="w-px h-4 bg-gray-500 mx-1"></div>
                <button id="btn-zoom-fit" class="hover:text-orange-400 text-xs font-semibold px-2">FIT</button>
            </div>

            <!-- The Scalable Preview -->
            <div id="preview-wrapper">
                <div id="iframe-scaler">
                    <iframe id="preview-frame" scrolling="no"></iframe>
                </div>
            </div>
        </section>
    </main>

    <script>
        // --- UI & EDITOR LOGIC ---
        const htmlInput = document.getElementById('html-input');
        const btnUpdate = document.getElementById('btn-update');
        const btnExport = document.getElementById('btn-export');
        const exportStatus = document.getElementById('export-status');
        const previewFrame = document.getElementById('preview-frame');
        const iframeScaler = document.getElementById('iframe-scaler');
        const previewWrapper = document.getElementById('preview-wrapper');
        const zoomLabel = document.getElementById('zoom-label');

        let currentZoom = 0.5;

        const editor = CodeMirror.fromTextArea(htmlInput, {
            mode: "xml", theme: "material-darker", lineNumbers: true, lineWrapping: true, autoCloseTags: true
        });

        // Anti-abyss pasting
        editor.on('paste', (cm, event) => {
            const pastedText = (event.clipboardData || window.clipboardData).getData('text');
            if (pastedText && pastedText.length > 500) {
                setTimeout(() => { cm.scrollTo(0, 0); cm.setCursor(0, 0); }, 10);
            }
        });

        // --- ZOOM CONTROLS ---
        function applyZoom() {
            iframeScaler.style.transform = `scale(${currentZoom})`;
            zoomLabel.innerText = Math.round(currentZoom * 100) + '%';
        }

        document.getElementById('btn-zoom-in').onclick = () => { currentZoom = Math.min(1.5, currentZoom + 0.1); applyZoom(); };
        document.getElementById('btn-zoom-out').onclick = () => { currentZoom = Math.max(0.2, currentZoom - 0.1); applyZoom(); };
        document.getElementById('btn-zoom-fit').onclick = () => { 
            // Calculate scale based on container width minus some padding
            const wrapperWidth = previewWrapper.clientWidth - 80;
            currentZoom = Math.min(1.0, wrapperWidth / 1280);
            applyZoom(); 
        };

        // --- RENDERER ---
        function updatePreview() {
            const doc = previewFrame.contentWindow.document;
            doc.open();
            // We inject the HTML. The iframe naturally renders it at true 1:1 scale (1280px wide).
            // We strip any massive body height CSS just to prevent iframe scrolling weirdness
            let rawCode = editor.getValue().replace(/min-height:\s*100vh;/g, '');
            doc.write(rawCode);
            doc.close();

            // Auto-adjust iframe height to match content so we can scroll the wrapper, not the iframe
            setTimeout(() => {
                const body = previewFrame.contentWindow.document.body;
                const html = previewFrame.contentWindow.document.documentElement;
                const height = Math.max(body.scrollHeight, body.offsetHeight, html.clientHeight, html.scrollHeight, html.offsetHeight);
                iframeScaler.style.height = height + 'px';
                // Trigger fit on first load
                if(zoomLabel.innerText === '50%') document.getElementById('btn-zoom-fit').click();
            }, 300);
        }

        setTimeout(updatePreview, 100);
        btnUpdate.addEventListener('click', updatePreview);
        editor.on('change', () => { setTimeout(updatePreview, 1500); });


        // --- THE ALCHEMY v5.0: UNIVERSAL SPATIAL ENGINE ---
        // This converts screen pixels inside the iframe into PowerPoint inches (96 DPI)
        const PX_TO_INCH = 1 / 96;

        function rgbToHex(rgb) {
            let sep = rgb.indexOf(",") > -1 ? "," : " ";
            let rgba = rgb.substr(4).split(")")[0].split(sep);
            if(rgba.length < 3) return null;
            let r = (+rgba[0]).toString(16), g = (+rgba[1]).toString(16), b = (+rgba[2]).toString(16);
            if (r.length == 1) r = "0" + r;
            if (g.length == 1) g = "0" + g;
            if (b.length == 1) b = "0" + b;
            return (r + g + b).toUpperCase();
        }

        btnExport.addEventListener('click', async () => {
            try {
                btnExport.disabled = true;
                exportStatus.classList.remove('hidden');

                let pres = new PptxGenJS();
                pres.defineLayout({ name: 'TFV_WIDE', width: 13.33, height: 7.5 });
                pres.layout = 'TFV_WIDE'; 
                pres.author = 'TFV-ify Universal Engine';

                // We extract layout data straight from the rendered iframe DOM!
                const doc = previewFrame.contentWindow.document;
                const slides = doc.querySelectorAll('.slide-container, .slide');

                if(slides.length === 0) {
                    alert("No <div class='slide-container'> or <div class='slide'> found!");
                    btnExport.disabled = false;
                    exportStatus.classList.add('hidden');
                    return;
                }

                slides.forEach((htmlSlide) => {
                    let pptSlide = pres.addSlide();
                    let slideRect = htmlSlide.getBoundingClientRect();
                    
                    // 1. Determine Background Color
                    let slideBg = window.getComputedStyle(htmlSlide).backgroundColor;
                    if (slideBg && slideBg !== 'rgba(0, 0, 0, 0)' && slideBg !== 'transparent') {
                        pptSlide.background = { color: rgbToHex(slideBg) };
                    } else {
                        pptSlide.background = { color: 'FFFFFF' };
                    }

                    // 2. Iterate over EVERY node inside the slide to extract Shapes and Text
                    // We only want leaf nodes (elements that actually contain the text, not their wrappers)
                    const elements = htmlSlide.querySelectorAll('*');
                    
                    elements.forEach(el => {
                        let rect = el.getBoundingClientRect();
                        // Ignore invisible elements or elements with zero size
                        if (rect.width === 0 || rect.height === 0 || window.getComputedStyle(el).display === 'none') return;
                        
                        // Calculate relative position within the slide in inches
                        let x = (rect.left - slideRect.left) * PX_TO_INCH;
                        let y = (rect.top - slideRect.top) * PX_TO_INCH;
                        let w = rect.width * PX_TO_INCH;
                        let h = rect.height * PX_TO_INCH;

                        let computedStyles = window.getComputedStyle(el);
                        
                        // --- EXTRACT SHAPES (Background boxes, borders, lines) ---
                        let bgColor = computedStyles.backgroundColor;
                        let hasBg = bgColor && bgColor !== 'rgba(0, 0, 0, 0)' && bgColor !== 'transparent';
                        let hasBorder = computedStyles.borderBottomStyle !== 'none' || computedStyles.borderLeftStyle !== 'none';
                        
                        // If it has a background or border, AND it's a structural element (div, section), draw it.
                        // We skip 'body' or the slide container itself.
                        if ((hasBg || hasBorder) && (el.tagName === 'DIV' || el.tagName === 'HR') && el !== htmlSlide) {
                            
                            let shapeOpts = { x: x, y: y, w: w, h: h };
                            
                            if (hasBg) shapeOpts.fill = { color: rgbToHex(bgColor) };
                            
                            // Check for border-left (like your highlighted boxes)
                            if (computedStyles.borderLeftStyle !== 'none') {
                                let bColor = rgbToHex(computedStyles.borderLeftColor);
                                let bWidth = parseFloat(computedStyles.borderLeftWidth) * PX_TO_INCH;
                                // Draw a tiny rectangle to simulate the left border
                                pptSlide.addShape(pres.ShapeType.rect, { x: x, y: y, w: bWidth, h: h, fill: { color: bColor } });
                            }
                            
                            // Check for border-bottom (like your yellow slide title underline)
                            if (computedStyles.borderBottomStyle !== 'none') {
                                let bColor = rgbToHex(computedStyles.borderBottomColor);
                                let bWidth = parseFloat(computedStyles.borderBottomWidth) * PX_TO_INCH;
                                pptSlide.addShape(pres.ShapeType.rect, { x: x, y: y + h - bWidth, w: w, h: bWidth, fill: { color: bColor } });
                            }

                            // If it's a rounded box
                            if (parseFloat(computedStyles.borderRadius) > 0) {
                                pptSlide.addShape(pres.ShapeType.roundRect, shapeOpts);
                            } else if (hasBg) {
                                pptSlide.addShape(pres.ShapeType.rect, shapeOpts);
                            }
                        }

                        // --- EXTRACT TEXT ---
                        // Only extract text if this element directly contains text nodes (no block children)
                        let text = "";
                        let isLeafText = false;
                        
                        // We extract text for standard text tags, OR divs that have direct text content
                        const textTags = ['H1', 'H2', 'H3', 'H4', 'P', 'LI', 'SPAN', 'STRONG', 'EM', 'I', 'B'];
                        if (textTags.includes(el.tagName)) {
                            isLeafText = true;
                            text = el.innerText.trim();
                        }

                        if (isLeafText && text.length > 0) {
                            // Map Font properties
                            let fontSizePx = parseFloat(computedStyles.fontSize);
                            let fontSizePt = fontSizePx * 0.75; // Convert px to pt
                            let fontFace = computedStyles.fontFamily.includes('Bitter') || computedStyles.fontFamily.includes('serif') ? 'Georgia' : 'Arial';
                            let fontColor = rgbToHex(computedStyles.color) || '000000';
                            let bold = parseInt(computedStyles.fontWeight) > 500 || computedStyles.fontWeight === 'bold';
                            let align = computedStyles.textAlign;
                            
                            let textOpts = {
                                x: x, y: y, w: w + 0.1, h: h + 0.1, // Slight buffer to prevent PPTX line wrapping
                                fontSize: fontSizePt,
                                fontFace: fontFace,
                                color: fontColor,
                                bold: bold,
                                align: align,
                                valign: 'top',
                                margin: 0,
                                wrap: true
                            };

                            if (el.tagName === 'LI') {
                                textOpts.bullet = true;
                                // Indent bullet text slightly
                                textOpts.x += 0.2;
                                textOpts.w -= 0.2;
                            }

                            pptSlide.addText(text, textOpts);
                        }
                    });
                });

                await pres.writeFile({ fileName: `TFV_Export_Universal_${new Date().getTime()}.pptx` });
                
                exportStatus.innerText = "Export Complete!";
                setTimeout(() => exportStatus.classList.add('hidden'), 3000);
            } catch (error) {
                console.error(error);
                alert("A fatal error occurred during the universal extraction. Check console.");
            } finally {
                btnExport.disabled = false;
            }
        });
    </script>
</body>
</html>
